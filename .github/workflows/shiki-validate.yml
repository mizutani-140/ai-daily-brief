name: Shiki Validate

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  validate:
    name: Validate Shiki mirror
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Validate Shiki artifacts
        run: python3 scripts/validate_shiki.py

      - name: Compile Shiki Python files
        run: python3 -m py_compile scripts/*.py

      - name: Run Shiki Python regression tests
        run: python3 -m unittest discover -s tests

      - name: Run all Shiki contract tests
        shell: bash
        run: |
          set -euo pipefail
          for script in scripts/test_shiki_*.sh; do
            echo "::group::$script"
            bash "$script"
            echo "::endgroup::"
          done

      - name: Install workflow lint tools
        shell: bash
        env:
          ACTIONLINT_VERSION: 1.7.7
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSfL "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz" -o /tmp/actionlint.tar.gz
          tar -xzf /tmp/actionlint.tar.gz -C /tmp actionlint
          sudo install -m 0755 /tmp/actionlint /usr/local/bin/actionlint

      - name: Run actionlint
        run: bash scripts/test_shiki_workflow_lint.sh --strict

      - name: Run shellcheck
        run: bash scripts/test_shiki_shellcheck.sh --strict
