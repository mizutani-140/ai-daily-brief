name: Shiki Orchestrator

on:
  workflow_dispatch:
    inputs:
      plan_path:
        description: "Path to a grilled Shiki plan JSON in the repository"
        required: true
        default: ".shiki/inbox/plan.json"
      mode:
        description: "dry-run or execute-github"
        required: true
        default: "dry-run"
        type: choice
        options:
          - dry-run
          - execute-github
  issue_comment:
    types: [created]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  shiki-run:
    name: Shiki orchestrator run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || (startsWith(github.event.comment.body, '/shiki') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    permissions:
      contents: read
      issues: read
      pull-requests: read
    outputs:
      plan_path: ${{ steps.command.outputs.plan_path }}
      mode: ${{ steps.command.outputs.mode }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve command
        id: command
        shell: bash
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "plan_path=${{ inputs.plan_path }}" >> "$GITHUB_OUTPUT"
            echo "mode=${{ inputs.mode }}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          plan_path="$(printf '%s\n' "$COMMENT_BODY" | awk '/^plan:/{print $2; exit}')"
          mode="$(printf '%s\n' "$COMMENT_BODY" | awk '/^mode:/{print $2; exit}')"
          echo "plan_path=${plan_path:-.shiki/inbox/plan.json}" >> "$GITHUB_OUTPUT"
          echo "mode=${mode:-dry-run}" >> "$GITHUB_OUTPUT"

      - name: Run Shiki plan
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.command.outputs.mode }}" == "execute-github" ]]; then
            echo "execute-github requested; this read-only job performs the dry-run gate first."
          fi
          python3 scripts/shiki.py smoke live --target . --plan-file "${{ steps.command.outputs.plan_path }}" --dry-run

  commit-evidence:
    name: Commit Shiki evidence PR
    needs: shiki-run
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && inputs.mode == 'execute-github'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Execute Shiki plan and open evidence PR
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          evidence_branch="shiki/orchestrator-evidence-${{ github.run_id }}"
          git switch -c "$evidence_branch"

          python3 scripts/shiki.py smoke live --target . --plan-file "${{ needs.shiki-run.outputs.plan_path }}" --execute-github

          if git diff --quiet; then
            echo "No Shiki evidence changes to commit."
            exit 0
          fi
          git config user.name "shiki-orchestrator"
          git config user.email "shiki-orchestrator@users.noreply.github.com"
          git add .shiki
          git commit -m "shiki: record orchestrator evidence"
          git push -u origin "$evidence_branch"
          gh pr create \
            --base main \
            --head "$evidence_branch" \
            --title "shiki: record orchestrator evidence (${{ github.run_id }})" \
            --body "Automated Shiki orchestrator evidence from workflow run ${{ github.run_id }}. Validate, CCA, and MergeGate must pass before this evidence lands."
